services:
  mindfull:
    build:
      context: .
    environment:
      MINDFULL_PAIRING_CODE: ${MINDFULL_PAIRING_CODE:-mindfull-local}
    init: true
    ports:
      - "${MINDFULL_PORT:-3001}:3001"
    restart: unless-stopped
    volumes:
      - mindfull-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r => { if (!r.ok) process.exit(1) })",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mindfull-data:

