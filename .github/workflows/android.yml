name: Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Restore signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mindfull-release.jks"

      - name: Build signed APK
        env:
          MINDFULL_ANDROID_KEYSTORE: ${{ runner.temp }}/mindfull-release.jks
          MINDFULL_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MINDFULL_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MINDFULL_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm android:release

      - name: Upload signed APK
        uses: actions/upload-artifact@v6
        with:
          name: mindfull-${{ github.ref_name }}
          path: apps/web/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/web/android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
